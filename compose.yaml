services:
  gateway:
    build:
      context: .
    env_file:
      - .env
    ports:
      - '${PORT:-8080}:8080'
    depends_on:
      - redis
      - clickhouse

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - '8123:8123'
      - '9000:9000'
